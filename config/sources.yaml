# 统一采集服务 - 数据源配置
# type: rss | rsshub | github_trending | telegram
# scope: 一级分类（隔离下游，防止取错数据）
# category: 二级分类（精细分组）
# lang: zh | en | ru
# enabled: true/false
# filters: 关键词过滤（可选，命中任一即保留，空=全量）

# ========== RSSHub 基础配置 ==========
rsshub:
  base_url: "https://rss.255202.xyz"  # CF Workers 反代 → VPS RSSHub
  timeout: 20

# ========== 两级分类体系 ==========
# scope（一级）：下游按此隔离，不会拿错数据
# category（二级）：精细分组，同 scope 内可再过滤
#
# 查询示例：
#   GET /articles?scope=tech                → 晨报脚本拿全部技术类
#   GET /articles?scope=russia              → 俄罗斯晨报拿全部俄罗斯类
#   GET /articles?scope=selection           → 选品雷达拿全部选品类
#   GET /articles?scope=russia&category=news → 精确到子类
#
scope_labels:
  tech: "技术前沿"
  cross-border: "跨境电商"
  russia: "俄罗斯市场"
  selection: "选品参考"

category_labels:
  # --- tech ---
  ai-frontier: "AI前沿"
  dev-daily: "开发者日报"
  tech-industry: "科技产业"
  # --- cross-border ---
  industry: "跨境电商行业动态"
  tools: "电商工具/平台更新"
  # --- russia ---
  news: "俄语热点"
  economy: "俄罗斯经济"
  business: "商业财经"
  politics: "政治外交"
  retail: "俄罗斯零售"
  # --- selection ---
  fashion: "时尚选品"
  home: "家居百货选品"
  deals: "折扣促销"
  gadgets: "好物推荐"
  wb-recommend: "WB好物推荐"
  wb-fashion: "WB时尚穿搭"
  wb-home: "WB家居装饰"
  wb-deals: "WB折扣优惠"

